<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - GyanManthan</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/blog.css">
<link rel="stylesheet" href="/test-file/test.css">
<style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    display: flex;
    flex-direction: column;
    background: #f5f7fb;
    font-family: Arial, sans-serif;
  }

  #content {
     display: flex;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
    flex: 1; /* ye main trick hai */
    padding:140px 40px 60px 40px;
  }

  .login-box {
    background: #ffffff;
    padding: 30px;
    width: 320px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    text-align: center;
  }

  .login-box h2 {
    margin-bottom: 20px;
  }

  .login-box input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
  }

  .login-box input:focus {
    border-color: #007bff;
  }

  .login-box button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
  }

  .login-box button:hover {
    background: #0056b3;
  }

  #msg {
    color: red;
    margin-top: 10px;
  }
</style>
</head>
<body>

  <!-- Header (your script.js will fill this) -->

  <div id="header"></div>

<div id="content">
  <div class="login-box">
    <h2>Login to Start Test</h2>

    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>

    <button onclick="login()">Login</button>

    <p id="msg"></p>
  </div>
</div>

  <div id="footer"></div>

</body>

  <!-- Your existing global script -->
  <script src="/script.js"></script>

  <!-- Login logic -->
  <script>
function login() {
  const user = document.getElementById("username").value;
  const pass = document.getElementById("password").value;

  if (user === "student1" && pass === "1234") {
    localStorage.setItem("isLoggedIn", "true");
     localStorage.removeItem("testStarted");
    
    const params = new URLSearchParams(window.location.search);
    const testId = params.get("test");

    window.location.href = `test-generic.html?test=${testId}`;

  } else {
    document.getElementById("msg").innerText = "Invalid credentials!";
  }
}
/* 👇 ADD THIS BELOW */
document.getElementById("username").addEventListener("keydown", handleEnter);
document.getElementById("password").addEventListener("keydown", handleEnter);

function handleEnter(e){
  if(e.key === "Enter"){
    login();
    }
  }
  </script>

</body>
</html>
